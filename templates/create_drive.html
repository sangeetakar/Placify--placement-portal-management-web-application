{% extends "layout.html" %}
{% block title %}Create Drive • Placify{% endblock %}

{% block content %}

<h3 class="mb-4">Create Placement Drive</h3>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="POST">

            <!-- Job Title -->
            <div class="mb-3">
                <label class="form-label">Job Title</label>
                <input type="text"
                       name="job_title"
                       class="form-control"
                       required>
            </div>

            <!-- Job Description -->
            <div class="mb-3">
                <label class="form-label">Job Description</label>
                <textarea name="job_description"
                          class="form-control"
                          rows="4"
                          required></textarea>
            </div>

            <!-- Eligibility Criteria -->
            <div class="mb-3">
                <label class="form-label">Eligibility Criteria</label>
                <textarea name="eligibility"
                          class="form-control"
                          rows="3"
                          placeholder="e.g. CGPA > 7.0, CS/IT only"></textarea>
            </div>

            <!-- Application Deadline -->
            <div class="mb-3">
                <label class="form-label">Application Deadline</label>
                <input type="date"
                       name="deadline"
                       class="form-control">
            </div>

            <div class="d-flex justify-content-between">
                <a href="{{ url_for('main.company_dashboard') }}"
                   class="btn btn-outline-secondary">
                    Cancel
                </a>

                <button type="submit"
                        class="btn btn-primary">
                    Submit for Approval
                </button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
