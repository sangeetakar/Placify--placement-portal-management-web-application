<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>
        {% block title %}
            Placify
        {% endblock %}
    </title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Purple Theme Styling -->
    <style>
        :root {
            --primary-purple: #6f42c1;
            --dark-purple: #5a32a3;
            --light-purple: #f4f0ff;
        }

        body {
            background-color: #f8f9fa;
        }

        /* Navbar */
        .navbar {
            background-color: var(--primary-purple);
        }

        .navbar-brand,
        .navbar-nav .nav-link {
            color: white !important;
            font-weight: 500;
        }

        .navbar-nav .nav-link:hover {
            opacity: 0.85;
        }

        /* Buttons */
        .btn-primary {
            background-color: var(--primary-purple);
            border-color: var(--primary-purple);
        }

        .btn-primary:hover {
            background-color: var(--dark-purple);
            border-color: var(--dark-purple);
        }

        /* Cards */
        .card {
            border-radius: 12px;
        }

        .section-bg {
            background-color: var(--light-purple);
            border-radius: 12px;
        }

        footer {
            margin-top: 60px;
            padding: 20px 0;
            text-align: center;
            color: #6c757d;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <!-- Include Navbar -->
    {% include "navbar.html" %}

    <!-- Main Content -->
    <div class="container py-5">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        © 2026 Placify • Campus Placement Management System
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    {% block script %}
    {% endblock %}

</body>
</html>
