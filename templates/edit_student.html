{% extends "layout.html" %}
{% block title %}Edit Profile{% endblock %}

{% block content %}

<h2 class="mb-4">Edit Profile</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="POST" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Full Name</label>
                <input type="text" name="full_name"
                       value="{{ student.full_name }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email"
                       value="{{ student.email }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone"
                       value="{{ student.phone }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Department</label>
                <input type="text" name="department"
                       value="{{ student.department }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Degree</label>
                <input type="text" name="degree"
                       value="{{ student.degree }}"
                       class="form-control">
            </div>

            <div class="mb-3">
                <label>Re-upload Resume</label>
                <input type="file" name="resume"
                       class="form-control">
            </div>

            <button type="submit"
                    class="btn btn-primary">
                Update Profile
            </button>

        </form>

    </div>
</div>

{% endblock %}
